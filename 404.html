<!DOCTYPE html>
<html lang="en">
<head>

  <!-- FontAwesome Icons (for visuals) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .error-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 2rem;
    }
    .error-card {
      max-width: 500px;
      width: 100%;
      padding: 3.5rem 2.5rem;
      border-radius: var(--border-radius-lg);
      position: relative;
      z-index: 1;
    }
    .error-code {
      font-size: 7rem;
      font-family: var(--font-headings);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -0.05em;
      background: var(--gradient-cyber);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: pulse 2s infinite;
    }
    .error-title {
      font-size: 1.75rem;
      margin-bottom: 1rem;
    }
    .error-desc {
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    @keyframes pulse {
      0% { filter: drop-shadow(0 0 2px rgba(0,242,254,0.4)); }
      50% { filter: drop-shadow(0 0 15px rgba(139,92,246,0.6)); }
      100% { filter: drop-shadow(0 0 2px rgba(0,242,254,0.4)); }
    }
  </style>
</head>
<body>
  
  <div class="error-wrapper">

    </div>
  </div>

</body>
</html>
